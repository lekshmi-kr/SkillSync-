<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../css/style.css">
</head>

<body> 
<header>
    <h1 class="logo">SkillSync</h1>

    <nav>
        <a href="../index.html">Home</a>
        <a href="tutors.html">Tutors</a>
        <a href="signup.html">Become a Tutor</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<h1 style="text-align:center;">Register as a Tutor</h1>

<form class="signup-form">

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Skill Category</label>
<select>
<option disabled selected>Select Category</option>
<option>Music</option>
<option>Dance</option>
<option>Art & Craft</option>
<option>Sports</option>
<option>Technology</option>
<option>Languages</option>
<option>Fitness & Yoga</option>
<option>Photography</option>
<option>Public Speaking</option>
<option>Design</option>
<option>Academics</option>
<option>Cooking</option>
<option>Handicrafts</option>
<option>Drama & Acting</option>
<option>Other</option>
</select>

<label>Specific Skill</label>
<input type="text" placeholder="e.g. Guitar">

<label>Experience (years)</label>
<input type="number">

<label>Location</label>
<input type="text" placeholder="City">

<label>Password</label>
<input type="password">

<label>Confirm Password</label>
<input type="password">

<label>Upload Profile Photo</label>
<input type="file">

<button type="submit">Register</button>

</form>

</body>
</html>
