<h1 style="text-align:center; margin-top:20px;">Available Tutors</h1>
<input type="text" id="searchBar" placeholder="Search by skill..." onkeyup="searchTutor()">

<div class="tutor-container">

<div class="match-section">

View Profile
</button>
